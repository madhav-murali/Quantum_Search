name: Lint & Test

on:
  push:
    branches: ['*']
    paths:
      - '**.py'
      - 'requirements.txt'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.10'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 src/ mlops/ qtl/ scripts/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

          # Warnings (non-blocking)
          flake8 src/ mlops/ qtl/ scripts/ \
            --count --max-complexity=15 \
            --max-line-length=120 \
            --statistics \
            --exit-zero

      - name: Validate Python syntax
        run: |
          python -m py_compile mlops/config.py
          python -m py_compile mlops/s3_utils.py
          python -m py_compile mlops/experiment_tracker.py
          python -m py_compile mlops/train_pipeline.py
          python -m py_compile run_experiments.py
          echo "✅ All files compile successfully"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "No tests found yet"
